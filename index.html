<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lotería — Mi Corrido Es Mi Legado</title>
<style>
  :root{
    --bg-deep:#5C1A1F; --bg-dark:#4A1319; --marigold:#E8A33D; --marigold-dark:#D98A2B;
    --cream:#F3E5C8; --cream-dim:#D9C3A0; --ink:#3A1108; --board-bg:#3F0F14;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:radial-gradient(circle at 50% 0%, var(--bg-deep) 0%, var(--bg-deep) 45%, var(--bg-dark) 100%);
    color:var(--cream);
    font-family:Georgia,"Times New Roman",serif;
    padding-bottom:40px;
  }
  .scallop{
    height:14px;width:100%;
    background:radial-gradient(circle, transparent 65%, var(--cream) 66%) 0 0/24px 24px repeat-x;
    opacity:0.15;
  }
  header{text-align:center;padding:18px 16px 6px;}
  h1{
    font-size:44px;letter-spacing:4px;text-transform:uppercase;margin:0;
    color:var(--marigold);text-shadow:0 2px 0 #2A0C10;
  }
  .subtitle{
    font-family:system-ui,sans-serif;font-size:15px;letter-spacing:1px;
    color:var(--cream-dim);margin:6px 0 0;
  }
  .spotlight{display:flex;flex-direction:column;align-items:center;padding:10px 16px 6px;}
  .burst-wrap{position:relative;width:260px;height:346px;display:flex;align-items:center;justify-content:center;max-width:82vw;max-height:calc(82vw * 1.333);}
  .burst{
    position:absolute;inset:-28px;
    background:repeating-conic-gradient(var(--marigold) 0deg 9deg, transparent 9deg 18deg);
    border-radius:50%;opacity:0.28;
  }
  .spotlight-img{
    position:relative;width:100%;height:100%;object-fit:cover;border-radius:18px;
    border:5px solid var(--cream);box-shadow:0 14px 30px rgba(0,0,0,0.45);
  }
  .spotlight-empty{
    position:relative;width:100%;height:100%;border-radius:18px;
    border:3px dashed rgba(217,164,65,0.47);display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:var(--cream-dim);
    font-family:system-ui,sans-serif;
  }
  .spotlight-meta{margin-top:14px;text-align:center;}
  .spotlight-name{font-size:28px;font-weight:700;}
  .deck-count{font-family:system-ui,sans-serif;font-size:15px;color:var(--cream-dim);margin-top:4px;}
  .controls{display:flex;gap:10px;justify-content:center;padding:16px 16px;flex-wrap:wrap;}
  button{cursor:pointer;font-family:system-ui,sans-serif;}
  .btn-primary{
    font-weight:800;font-size:20px;padding:18px 28px;border-radius:999px;border:none;
    background:linear-gradient(180deg,#F0B24E,var(--marigold-dark));color:var(--ink);
    box-shadow:0 6px 14px rgba(0,0,0,0.4);min-height:60px;
  }
  .btn-primary:disabled{opacity:0.5;cursor:default;}
  .btn-ghost{
    font-weight:700;font-size:18px;padding:16px 22px;border-radius:999px;
    border:3px solid rgba(217,164,65,0.5);background:transparent;color:var(--cream);
    min-height:60px;
  }
  .btn-ghost.active{border-color:var(--marigold);}
  .win-banner{
    text-align:center;margin:0 16px 12px;padding:16px;border-radius:12px;
    background:var(--marigold);color:var(--ink);font-weight:800;font-size:22px;
    font-family:system-ui,sans-serif;letter-spacing:0.5px;display:none;
  }
  .win-banner.show{display:block;}
  .strip{display:flex;gap:6px;overflow-x:auto;padding:4px 16px 14px;}
  .strip img{
    width:40px;height:54px;object-fit:cover;border-radius:6px;
    border:2px solid rgba(243,229,200,0.4);flex-shrink:0;
  }
  .board-wrap{padding:0 12px;}
  .board-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    background:var(--board-bg);padding:8px;border-radius:16px;
    border:3px solid rgba(217,164,65,0.27);
  }
  .cell{
    position:relative;padding:0;border:2px solid rgba(243,229,200,0.13);
    border-radius:8px;overflow:hidden;background:none;aspect-ratio:3/4;
  }
  .cell img{width:100%;height:100%;object-fit:cover;display:block;}
  .cell.uncalled img{filter:grayscale(35%) brightness(0.75);}
  .cell.uncalled{cursor:default;}
  .mark-overlay{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(58,17,8,0.35);
  }
  .mark-overlay.show{display:flex;}
  .mark-bean{
    width:62%;height:62%;border-radius:50%;
    background:rgba(232,163,61,0.85);border:3px solid var(--cream);
  }
  .rivals{margin-top:20px;padding:0 16px;}
  .rivals-title{font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--marigold);margin-bottom:8px;}
  .rivals-list{display:flex;flex-direction:column;gap:8px;}
  .rival-row{display:flex;align-items:center;gap:8px;}
  .rival-avatar{
    width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:system-ui,sans-serif;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
  }
  .rival-bar-track{flex:1;height:8px;border-radius:999px;background:rgba(243,229,200,0.13);overflow:hidden;}
  .rival-bar-fill{height:100%;border-radius:999px;transition:width 0.4s ease;}
  .rival-name{font-family:system-ui,sans-serif;font-size:12px;color:var(--cream-dim);width:72px;flex-shrink:0;}
</style>
</head>

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'es-MX';
    u.rate = 0.92;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

// ---------------------------------------------------------------------------
// Game state
// ---------------------------------------------------------------------------
let gameDeck = shuffle(DECK);
let calledIdx = 0;
let board = shuffle(DECK).slice(0,16).map(c => ({...c, marked:false}));
let autoplay = false;
let autoTimer = null;
let rivalProgress = RIVAL_NAMES.map(() => 0);
let status = 'playing';

const els = {
  spotlightImg: document.getElementById('spotlightImg'),
  spotlightEmpty: document.getElementById('spotlightEmpty'),
  spotlightName: document.getElementById('spotlightName'),
  deckCount: document.getElementById('deckCount'),
  btnCall: document.getElementById('btnCall'),
  btnAuto: document.getElementById('btnAuto'),
  btnNew: document.getElementById('btnNew'),
  winBanner: document.getElementById('winBanner'),
  strip: document.getElementById('strip'),
  boardGrid: document.getElementById('boardGrid'),
  rivalsList: document.getElementById('rivalsList'),
};

function calledSet(){
  return new Set(gameDeck.slice(0, calledIdx).map(c => c.n));
}

function checkWin(){
  const cs = calledSet();
  const marked = board.map(c => cs.has(c.n));
  return LINES.some(line => line.every(i => marked[i]));
}

function renderRivals(){
  els.rivalsList.innerHTML = '';
  RIVAL_NAMES.forEach((name,i) => {
    const row = document.createElement('div');
    row.className = 'rival-row';
    row.innerHTML = `
      <div class="rival-avatar" style="background:${RIVAL_COLORS[i]}">${name[0]}</div>
      <div class="rival-bar-track"><div class="rival-bar-fill" style="width:${(rivalProgress[i]/16)*100}%;background:${RIVAL_COLORS[i]}"></div></div>
      <div class="rival-name">${name}</div>
    `;
    els.rivalsList.appendChild(row);
  });
}

function renderBoard(){
  const cs = calledSet();
  els.boardGrid.innerHTML = '';
  board.forEach((c,i) => {
    const isCalled = cs.has(c.n);
    const cell = document.createElement('button');
    cell.className = 'cell' + (isCalled ? '' : ' uncalled');
    cell.setAttribute('aria-label', c.name);
    cell.innerHTML = `
      <img src="${c.img}" alt="${c.name}" />
      <div class="mark-overlay ${c.marked ? 'show' : ''}"><div class="mark-bean"></div></div>
    `;
    cell.addEventListener('click', () => {
      if(!isCalled) return;
      board[i] = {...board[i], marked: !board[i].marked};
      renderBoard();
      if(checkWin()){
        status = 'won';
        autoplay = false;
        clearTimeout(autoTimer);
        els.winBanner.classList.add('show');
        els.btnAuto.classList.remove('active');
        els.btnAuto.textContent = '▶ Automático';
      }
    });
    els.boardGrid.appendChild(cell);
  });
}

function renderStrip(){
  els.strip.innerHTML = '';
  gameDeck.slice(0, calledIdx).slice().reverse().forEach(c => {
    const img = document.createElement('img');
    img.src = c.img; img.alt = c.name; img.title = c.name;
    els.strip.appendChild(img);
  });
}

function renderSpotlight(){
  const cardsLeft = gameDeck.length - calledIdx;
  els.deckCount.textContent = `${cardsLeft} cartas restantes`;
  if(calledIdx > 0){
    const c = gameDeck[calledIdx-1];
    els.spotlightImg.src = c.img;
    els.spotlightImg.alt = c.name;
    els.spotlightImg.style.display = 'block';
    els.spotlightEmpty.style.display = 'none';
    els.spotlightName.textContent = `${c.n}. ${c.name}`;
  } else {
    els.spotlightImg.style.display = 'none';
    els.spotlightEmpty.style.display = 'flex';
    els.spotlightName.textContent = '—';
  }
}

function callNext(){
  if(calledIdx >= gameDeck.length || status === 'won') return;
  const card = gameDeck[calledIdx];
  calledIdx++;
  speak(card.name);
  rivalProgress = rivalProgress.map(v => Math.min(16, v + (Math.random() < 0.4 ? 1 : 0)));
  renderAll();
  els.btnCall.disabled = calledIdx >= gameDeck.length;
}

function renderAll(){
  renderSpotlight();
  renderStrip();
  renderBoard();
  renderRivals();
}

function newGame(){
  clearTimeout(autoTimer);
  gameDeck = shuffle(DECK);
  calledIdx = 0;
  board = shuffle(DECK).slice(0,16).map(c => ({...c, marked:false}));
  rivalProgress = RIVAL_NAMES.map(() => 0);
  status = 'playing';
  autoplay = false;
  els.winBanner.classList.remove('show');
  els.btnAuto.classList.remove('active');
  els.btnAuto.textContent = '▶ Automático';
  els.btnCall.disabled = false;
  renderAll();
}

function tick(){
  if(autoplay && status === 'playing' && calledIdx < gameDeck.length){
    callNext();
    autoTimer = setTimeout(tick, 2600);
  }
}

els.btnCall.addEventListener('click', callNext);
els.btnAuto.addEventListener('click', () => {
  autoplay = !autoplay;
  els.btnAuto.classList.toggle('active', autoplay);
  els.btnAuto.textContent = autoplay ? '⏸ Pausar' : '▶ Automático';
  if(autoplay) tick();
  else clearTimeout(autoTimer);
});
els.btnNew.addEventListener('click', newGame);

renderAll();
</script>
</body>
</html>
